<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 700" role="img" aria-labelledby="vanTitle">
  <title id="vanTitle">Hawkins Hardwood Flooring service van</title>
  <defs>
    <linearGradient id="stripe" x1="0" y1="0" x2="0.4" y2="1">
      <stop offset="0" stop-color="#E2B685"/>
      <stop offset="0.55" stop-color="#D4A373"/>
      <stop offset="1" stop-color="#B07F4F"/>
    </linearGradient>
    <linearGradient id="bodyFill" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#2B2B2B"/>
      <stop offset="0.35" stop-color="#181818"/>
      <stop offset="1" stop-color="#0A0A0A"/>
    </linearGradient>
    <linearGradient id="cabFill" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#FFFFFF"/>
      <stop offset="1" stop-color="#EDE8E0"/>
    </linearGradient>
    <radialGradient id="tireFill" cx="0.35" cy="0.35" r="0.75">
      <stop offset="0" stop-color="#2A2A2A"/>
      <stop offset="1" stop-color="#050505"/>
    </radialGradient>
    <linearGradient id="rimFill" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#8A8177"/>
      <stop offset="1" stop-color="#5A534A"/>
    </linearGradient>
    <radialGradient id="archFill" cx="0.5" cy="0" r="1">
      <stop offset="0" stop-color="#000000"/>
      <stop offset="1" stop-color="#000000" stop-opacity="0.55"/>
    </radialGradient>
    <filter id="softShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="10"/>
    </filter>
  </defs>

  <!-- ground shadow -->
  <ellipse cx="620" cy="600" rx="500" ry="22" fill="#000000" opacity="0.22" filter="url(#softShadow)"/>

  <!-- body silhouette -->
  <path d="M172 592
           C 140 592 116 566 122 534
           L 132 466
           C 140 400 152 350 176 316
           C 200 280 232 254 274 240
           L 300 172
           C 312 148 336 132 364 130
           L 1020 130
           C 1064 130 1100 166 1100 210
           L 1100 500
           C 1100 552 1058 592 1006 592
           Z"
        fill="url(#bodyFill)"/>

  <!-- cream cab section, left of the diagonal stripe -->
  <path d="M172 592
           C 140 592 116 566 122 534
           L 132 466
           C 140 400 152 350 176 316
           C 200 280 232 254 274 240
           L 300 172
           C 312 148 336 132 364 130
           L 452 130
           L 396 592
           Z"
        fill="url(#cabFill)"/>

  <!-- diagonal bronze accent stripe with pinstripe edges -->
  <path d="M452 130 L494 130 L438 592 L396 592 Z" fill="url(#stripe)"/>
  <path d="M452 130 L459 130 L403 592 L396 592 Z" fill="#FFFFFF" opacity="0.55"/>
  <path d="M487 130 L494 130 L438 592 L431 592 Z" fill="#00000022"/>

  <!-- windshield -->
  <path d="M188 336
           C 206 288 234 254 274 244
           L 320 240
           L 300 420
           L 200 420
           C 186 396 180 366 188 336 Z"
        fill="#101418"/>
  <path d="M210 300 L 300 270 L 290 340 L 205 355 Z" fill="#ffffff" opacity="0.12"/>

  <!-- lower door window strip -->
  <path d="M200 430 L300 430 L292 462 L204 462 Z" fill="#101418" opacity="0.55"/>

  <!-- side mirror -->
  <path d="M176 300 C 164 300 156 308 156 320 C 156 330 164 336 174 334 L 186 316 Z" fill="#141414"/>

  <!-- door seams -->
  <line x1="620" y1="150" x2="606" y2="592" stroke="#000000" stroke-opacity="0.3" stroke-width="3"/>
  <line x1="860" y1="150" x2="850" y2="592" stroke="#000000" stroke-opacity="0.3" stroke-width="3"/>
  <line x1="452" y1="470" x2="1080" y2="470" stroke="#000000" stroke-opacity="0.25" stroke-width="2"/>

  <!-- tail light -->
  <rect x="1064" y="330" width="18" height="60" rx="6" fill="#8C3B3B"/>
  <rect x="1064" y="330" width="18" height="18" rx="6" fill="#C97575"/>

  <!-- roofline highlight -->
  <path d="M320 138 L1010 138" stroke="#ffffff" stroke-opacity="0.12" stroke-width="6" stroke-linecap="round"/>

  <!-- wheel arches (cut look) -->
  <path d="M 313 592 A 117 117 0 0 1 547 592 Z" fill="url(#archFill)"/>
  <path d="M 313 592 A 117 117 0 0 1 547 592" fill="none" stroke="#3a3a3a" stroke-width="4" opacity="0.6"/>
  <path d="M 753 592 A 117 117 0 0 1 987 592 Z" fill="url(#archFill)"/>
  <path d="M 753 592 A 117 117 0 0 1 987 592" fill="none" stroke="#3a3a3a" stroke-width="4" opacity="0.6"/>

  <!-- wheels -->
  <g>
    <circle cx="430" cy="594" r="85" fill="url(#tireFill)"/>
    <circle cx="430" cy="594" r="85" fill="none" stroke="#000" stroke-width="2" opacity="0.5"/>
    <circle cx="430" cy="594" r="42" fill="url(#rimFill)"/>
    <circle cx="430" cy="594" r="42" fill="none" stroke="#3a352e" stroke-width="2"/>
    <circle cx="430" cy="594" r="14" fill="#232323"/>
    <circle cx="417" cy="582" r="5" fill="#ffffff" opacity="0.3"/>
  </g>
  <g>
    <circle cx="870" cy="594" r="85" fill="url(#tireFill)"/>
    <circle cx="870" cy="594" r="85" fill="none" stroke="#000" stroke-width="2" opacity="0.5"/>
    <circle cx="870" cy="594" r="42" fill="url(#rimFill)"/>
    <circle cx="870" cy="594" r="42" fill="none" stroke="#3a352e" stroke-width="2"/>
    <circle cx="870" cy="594" r="14" fill="#232323"/>
    <circle cx="857" cy="582" r="5" fill="#ffffff" opacity="0.3"/>
  </g>

  <!-- signage text -->
  <text x="512" y="222" font-family="Georgia, 'Times New Roman', serif" font-weight="700" font-size="82" fill="url(#stripe)" letter-spacing="1">HAWKINS</text>
  <text x="512" y="264" font-family="Georgia, 'Times New Roman', serif" font-weight="700" font-size="32" fill="url(#stripe)" letter-spacing="4">HARDWOOD FLOORING</text>

  <text x="512" y="322" font-family="Arial, Helvetica, sans-serif" font-weight="700" font-size="46" fill="#FFFFFF">401-486-5587</text>

  <text x="512" y="362" font-family="Arial, Helvetica, sans-serif" font-weight="600" font-size="20" letter-spacing="1.5" fill="#FFFFFF">SAND &#8226; REFINISH &#8226; STAIN &#8226; INSTALL &#8226; REPAIR</text>

  <text x="512" y="410" font-family="Georgia, serif" font-style="italic" font-size="23" fill="#FFFFFF">Free Estimates</text>
  <text x="740" y="410" font-family="Georgia, serif" font-style="italic" font-size="23" fill="#FFFFFF">Fully Insured</text>
</svg>
