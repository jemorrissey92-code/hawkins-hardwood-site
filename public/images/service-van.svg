<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 560" role="img" aria-labelledby="vanTitle">
  <title id="vanTitle">Hawkins Hardwood Flooring service van</title>
  <defs>
    <linearGradient id="stripe" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#D4A373"/>
      <stop offset="1" stop-color="#B07F4F"/>
    </linearGradient>
  </defs>

  <!-- ground shadow -->
  <ellipse cx="500" cy="478" rx="430" ry="18" fill="#141414" opacity="0.15"/>

  <!-- body -->
  <path d="M60 415
           C40 415 34 392 46 360
           L64 305
           C82 232 138 188 212 186
           L905 186
           C942 186 962 212 962 250
           L962 385
           C962 405 946 418 924 418
           L96 418
           C78 418 64 417 60 415 Z"
        fill="#141414"/>

  <!-- cream cab / hood section (front of van, left of diagonal stripe) -->
  <path d="M60 415
           C40 415 34 392 46 360
           L64 305
           C82 232 138 188 212 186
           L330 186
           L300 418
           L96 418
           C78 418 64 417 60 415 Z"
        fill="#F7F4F0"/>

  <!-- diagonal bronze accent stripe -->
  <path d="M330 186 L364 186 L336 418 L300 418 Z" fill="url(#stripe)"/>

  <!-- windshield / driver window -->
  <path d="M120 300
           C132 250 168 208 214 200
           L246 200
           L226 336
           L128 336
           C120 326 116 314 120 300 Z"
        fill="#141414"/>
  <path d="M128 336 L226 336 L214 358 L120 358 Z" fill="#141414" opacity="0.65"/>

  <!-- side mirror -->
  <rect x="118" y="252" width="16" height="10" rx="3" fill="#141414"/>

  <!-- door seam lines -->
  <line x1="430" y1="200" x2="416" y2="418" stroke="#000000" stroke-opacity="0.25" stroke-width="2"/>
  <line x1="700" y1="196" x2="690" y2="418" stroke="#000000" stroke-opacity="0.25" stroke-width="2"/>

  <!-- tail light accent near rear -->
  <rect x="905" y="270" width="14" height="46" rx="4" fill="#8C3B3B"/>

  <!-- rear bumper shading -->
  <path d="M905 405 L950 405 L940 418 L905 418 Z" fill="#000000" opacity="0.35"/>

  <!-- wheel wells (cut into body silhouette look) -->
  <circle cx="234" cy="420" r="62" fill="#0A0A0A"/>
  <circle cx="234" cy="420" r="62" fill="none" stroke="#141414" stroke-width="6"/>
  <circle cx="786" cy="420" r="62" fill="#0A0A0A"/>
  <circle cx="786" cy="420" r="62" fill="none" stroke="#141414" stroke-width="6"/>

  <!-- wheels -->
  <g>
    <circle cx="234" cy="420" r="44" fill="#1A1A1A"/>
    <circle cx="234" cy="420" r="20" fill="#6B6258"/>
    <circle cx="234" cy="420" r="7" fill="#1A1A1A"/>
  </g>
  <g>
    <circle cx="786" cy="420" r="44" fill="#1A1A1A"/>
    <circle cx="786" cy="420" r="20" fill="#6B6258"/>
    <circle cx="786" cy="420" r="7" fill="#1A1A1A"/>
  </g>

  <!-- signage text -->
  <text x="365" y="252" font-family="Georgia, 'Times New Roman', serif" font-weight="700" font-size="68" fill="url(#stripe)" letter-spacing="1">HAWKINS</text>
  <text x="365" y="288" font-family="Georgia, 'Times New Roman', serif" font-weight="700" font-size="28" fill="url(#stripe)" letter-spacing="3">HARDWOOD FLOORING</text>

  <text x="365" y="335" font-family="Arial, Helvetica, sans-serif" font-weight="700" font-size="38" fill="#FFFFFF">401-486-5587</text>

  <text x="365" y="366" font-family="Arial, Helvetica, sans-serif" font-weight="600" font-size="17" letter-spacing="1.5" fill="#FFFFFF">SAND &#8226; REFINISH &#8226; STAIN &#8226; INSTALL &#8226; REPAIR</text>

  <text x="365" y="402" font-family="Georgia, serif" font-style="italic" font-size="19" fill="#FFFFFF">Free Estimates</text>
  <text x="560" y="402" font-family="Georgia, serif" font-style="italic" font-size="19" fill="#FFFFFF">Fully Insured</text>
</svg>
